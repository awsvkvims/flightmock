# EAS_TOKEN must be added to GitHub repository secrets:
# Settings → Secrets and variables → Actions → New repository secret
# Name: EAS_TOKEN
# Value: your Expo access token (expo.dev → Account Settings → Access Tokens)

name: CD

on:
  push:
    branches: [main]

jobs:
  build:
    name: EAS Build (iOS Simulator)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build iOS simulator
        run: eas build --platform ios --profile simulator --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
      - name: Publish OTA update
        run: eas update --branch main --message "Deploy from CI - ${{ github.sha }}"
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
